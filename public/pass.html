<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nashama Arena QR Ticket</title>
    <style>
      :root {
        --maroon: #3a0617;
        --deep: #21040d;
        --gold: #d8a83e;
        --cream: #fff7e8;
        --ink: #211814;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        background: radial-gradient(circle at top, #fff5dc, var(--cream));
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 22px;
        border: 1px solid rgba(58, 6, 23, 0.12);
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 18px 45px rgba(58, 6, 23, 0.12);
        text-align: center;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        object-fit: cover;
      }

      h1 {
        margin: 0;
        color: var(--deep);
        font-size: 22px;
      }

      .qr {
        width: min(78vw, 280px);
        height: min(78vw, 280px);
        margin: 14px auto;
        padding: 12px;
        border: 8px solid var(--gold);
        border-radius: 14px;
        background: #fff;
      }

      .qr img {
        width: 100%;
        height: 100%;
      }

      p {
        margin: 8px 0 0;
        color: rgba(33, 24, 20, 0.7);
        line-height: 1.45;
      }

      code {
        display: block;
        margin-top: 12px;
        padding: 10px;
        overflow-wrap: anywhere;
        border-radius: 10px;
        background: var(--cream);
        color: var(--maroon);
        font-size: 12px;
      }

      .error {
        color: #991b1b;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="./assets/nashama-logo.jpg" alt="Nashama Arena" />
        <h1>Nashama Arena QR Ticket</h1>
      </div>
      <div id="content"></div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const payload = params.get("p") || "";
      const content = document.querySelector("#content");

      if (!payload || !payload.startsWith("NASHAMA|")) {
        content.innerHTML = '<p class="error">Invalid or missing ticket QR.</p>';
      } else {
        const src = "https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=" + encodeURIComponent(payload);
        content.innerHTML = `
          <div class="qr"><img src="${src}" alt="Ticket QR code" /></div>
          <p>Show this QR at the entrance. This ticket can be scanned one time only.</p>
          <code>${payload}</code>
        `;
      }
    </script>
  </body>
</html>
